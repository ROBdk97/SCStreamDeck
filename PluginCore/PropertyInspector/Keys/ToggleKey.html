<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title data-i18n-text="PropertyInspector.ToggleAction.PageTitle">Star Citizen Stream Deck Plugin PI - Toggle Key</title>
  <link href="../css/base.css" rel="stylesheet">
  <link id="pi-theme-styles" rel="stylesheet">
  <style>
    #resetHoldSeconds::-webkit-outer-spin-button,
    #resetHoldSeconds::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #resetHoldSeconds {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .pi-toggle-options .pi-dropdown__input-row {
      height: 32px;
    }

    .pi-toggle-options .pi-dropdown__input-wrapper {
      border-radius: var(--radius-sm);
    }
  </style>
  <script src="../js/sc-preload.js"></script>
  <script defer src="../js/sdpi-components.js"></script>
  <script defer src="../js/sc-components.js"></script>
  <script>
    // ToggleKey only: show only actions that behave like toggles.
    globalThis.SCPI_REQUIRE_TOGGLE_CANDIDATES = true;
  </script>
  <script defer src="../js/pi-function-key.js"></script>
</head>
<body>
<div class="pi-container">
  <div class="pi-panel">
    <div class="pi-dropdown" id="functionDropdown"></div>

    <div class="pi-section pi-details">
      <div class="pi-details__title pi-content-box"></div>
      <div class="pi-details__binding">
        <span class="pi-details__binding-label" data-i18n-text="PropertyInspector.Common.Binding.Keyboard">KEYBOARD</span>
        <span class="pi-details__binding-value" id="pi-details__binding-keyboard"></span>
      </div>
      <div class="pi-details__binding">
        <span class="pi-details__binding-label" data-i18n-text="PropertyInspector.Common.Binding.Mouse">MOUSE</span>
        <span class="pi-details__binding-value" id="pi-details__binding-mouse"></span>
      </div>
      <div class="pi-details__binding">
        <span class="pi-details__binding-label" data-i18n-text="PropertyInspector.Common.Binding.Gamepad">GAMEPAD</span>
        <span class="pi-details__binding-value" id="pi-details__binding-gamepad"></span>
      </div>
      <div class="pi-details__binding">
        <span class="pi-details__binding-label" data-i18n-text="PropertyInspector.Common.Binding.Joystick">JOYSTICK</span>
        <span class="pi-details__binding-value" id="pi-details__binding-joystick"></span>
      </div>
    </div>

    <div class="pi-section">
      <div class="pi-description__content pi-content-box"></div>
    </div>

    <div class="pi-section pi-toggle-options">
      <div class="pi-picker-grid">
        <div class="pi-picker-row">
          <div class="pi-picker-label"
               data-i18n-text="PropertyInspector.ToggleAction.ResetLabel"
               data-i18n-title="PropertyInspector.ToggleAction.ResetTooltip"
               title="Hold duration (seconds) to flip state without executing the binding.">Reset (s)</div>
          <div class="pi-dropdown">
            <div class="pi-dropdown__input-row">
              <div class="pi-dropdown__input-wrapper">
                <input aria-label="Reset hold seconds"
                       data-i18n-aria-label="PropertyInspector.ToggleAction.ResetAriaLabel"
                       id="resetHoldSeconds"
                       max="10"
                       min="0.2"
                       step="0.1"
                       type="number"
                       value="1.0">
              </div>
              <button class="file-picker-clear"
                      data-i18n-title="PropertyInspector.ToggleAction.ResetDefaultTitle"
                      disabled
                      id="resetHoldSecondsClear"
                      type="button">X</button>
            </div>
          </div>
        </div>

        <div class="pi-picker-row">
        <div class="pi-picker-label" data-i18n-text="PropertyInspector.Common.Audio.Label">Sound</div>
        <div class="pi-file-picker" data-accept=".wav,.mp3" id="audioFilePicker"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
